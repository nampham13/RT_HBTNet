project:
  name: "BT-ShutterNet-Smoke"
  seed: 42
  device: "auto"

data:
  dataset: "exposure_flow"
  image_size: {height: 32, width: 64}
  sequence_length: 3
  grayscale: true
  normalize: true
  datasets:
    exposure_flow:
      root: "data/toy_exposure"
      split: "training"
      image_subdir: "final"
      flow_subdir: "flow"
      stride: 2
      samples_per_clip: 1
      integration_samples: 5
      render_at_target_resolution: true
      alpha_values: [0.1, 0.3, 0.6, 0.9]
      max_flow: 100.0

roi:
  mode: "full"
  rois: []
  resize_width: 64
  resize_height: 32

model:
  encoder: "mobilenetv3_small"
  encoder_truncate_at: 2
  encoder_include_edges: true
  in_channels: 1
  feature_dim: 16
  temporal_num_blocks: 1
  temporal_use_tsm: true
  use_context_quality: true
  prediction_mode: "physics"
  dropout: 0.0

physics:
  eps: 0.000001
  min_motion_px: 0.05

training:
  batch_size: 2
  epochs: 1
  lr: 0.001
  weight_decay: 0.0001
  num_workers: 0
  val_fraction: 0.25
  loss:
    alpha_weight: 1.0
    local_alpha_weight: 0.0
    motion_weight: 0.25
    blur_weight: 0.25
    physics_weight: 0.25
    direction_weight: 0.05

inference:
  ema_alpha: 0.2
