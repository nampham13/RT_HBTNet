project:
  name: "BT-ShutterNet-Kaggle"
  seed: 42
  device: "auto"

data:
  dataset: "exposure_flow"
  image_size:
    height: 64
    width: 128
  sequence_length: 5
  grayscale: true
  normalize: true
  datasets:
    exposure_flow:
      # Override this with --data-root if your Kaggle dataset slug differs.
      root: "/kaggle/input/mpi-sintel-dataset"
      split: "training"
      image_subdir: "final"
      flow_subdir: "flow"
      stride: 2
      samples_per_clip: 2
      integration_samples: 9
      render_at_target_resolution: true
      gamma: 2.2
      alpha_min: 0.02
      alpha_max: 0.95
      max_flow: 400.0

roi:
  mode: "full"
  rois: []
  resize_width: 128
  resize_height: 64

model:
  encoder: "mobilenetv3_small"
  encoder_truncate_at: 4
  encoder_include_edges: true
  in_channels: 1
  feature_dim: 64
  temporal_num_blocks: 3
  temporal_use_tsm: true
  use_context_quality: true
  prediction_mode: "physics"
  dropout: 0.1

physics:
  eps: 0.000001
  min_motion_px: 0.25

training:
  batch_size: 8
  epochs: 30
  lr: 0.0002
  weight_decay: 0.0001
  # Kaggle is Linux; try 2 or 4 workers. Run profile_input_pipeline.py first.
  num_workers: 2
  val_fraction: 0.2
  loss:
    alpha_weight: 1.0
    local_alpha_weight: 0.0
    motion_weight: 0.25
    blur_weight: 0.25
    physics_weight: 0.25
    direction_weight: 0.05

inference:
  show_window: false
  ema_alpha: 0.2
  min_confidence: 0.05

benchmark:
  warmup_iters: 20
  test_iters: 100
