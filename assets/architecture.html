<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RT-HBTNet Architecture</title>
  <style>
    body {
      margin: 0;
      background: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
    }

    .page {
      width: 1400px;
      height: 760px;
      margin: 0 auto;
      background: white;
      border: 2px solid #1f2937;
      box-sizing: border-box;
    }

    svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .label {
      font-size: 16px;
      font-weight: 700;
    }

    .node-title {
      font-size: 14px;
      font-weight: 700;
    }

    .node-text {
      font-size: 12px;
    }

    .tiny {
      font-size: 11px;
    }

    .box {
      stroke-width: 1.6;
    }

    .branch {
      stroke-width: 1.6;
      stroke-dasharray: 8 7;
    }

    .arrow {
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .dash {
      stroke-dasharray: 8 7;
    }
  </style>
</head>
<body>
  <main class="page">
    <svg viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
      <title id="title">RT-HBTNet architecture</title>
      <desc id="desc">Simplified RT-HBTNet architecture with shared visual encoding, temporal, blur, and context branches, fusion, stabilization, and final speed.</desc>
      <defs>
        <marker id="arrow-gray" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto">
          <path d="M1,1 L11,6 L1,11 Z" fill="#6f7169"></path>
        </marker>
        <marker id="arrow-blue" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto">
          <path d="M1,1 L11,6 L1,11 Z" fill="#256fc2"></path>
        </marker>
        <marker id="arrow-amber" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto">
          <path d="M1,1 L11,6 L1,11 Z" fill="#b66b00"></path>
        </marker>
        <marker id="arrow-coral" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto">
          <path d="M1,1 L11,6 L1,11 Z" fill="#d04d2b"></path>
        </marker>
        <marker id="arrow-purple" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto">
          <path d="M1,1 L11,6 L1,11 Z" fill="#6b4bd2"></path>
        </marker>
        <marker id="arrow-teal" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto">
          <path d="M1,1 L11,6 L1,11 Z" fill="#007b68"></path>
        </marker>
        <marker id="arrow-green" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto">
          <path d="M1,1 L11,6 L1,11 Z" fill="#2e9c45"></path>
        </marker>
      </defs>

      <rect x="0" y="0" width="1400" height="760" fill="#ffffff"></rect>
      <text x="700" y="36" text-anchor="middle" class="label" fill="#1f2937">RT-HBTNet: Hybrid Blur-Texture Speed Estimation</text>

      <g text-anchor="middle" fill="#111827">
        <rect x="28" y="325" width="110" height="58" rx="7" fill="#f1f0ea" stroke="#77746c" class="box"></rect>
        <text x="83" y="348" class="node-title">Video</text>
        <text x="83" y="366" class="node-text">monocular</text>

        <rect x="165" y="325" width="130" height="58" rx="7" fill="#f1f0ea" stroke="#77746c" class="box"></rect>
        <text x="230" y="346" class="node-title">Multi-ROI</text>
        <text x="230" y="364" class="node-text">preprocess</text>

        <rect x="322" y="325" width="145" height="58" rx="7" fill="#f1f0ea" stroke="#77746c" class="box"></rect>
        <text x="394" y="346" class="node-title">Descriptor</text>
        <text x="394" y="364" class="node-text">I<tspan baseline-shift="sub">t</tspan> + |grad I<tspan baseline-shift="sub">t</tspan>|</text>

        <rect x="494" y="325" width="160" height="58" rx="7" fill="#f1f0ea" stroke="#77746c" class="box"></rect>
        <text x="574" y="346" class="node-title">Shared encoder</text>
        <text x="574" y="364" class="node-text">feature map F<tspan baseline-shift="sub">t</tspan></text>
      </g>

      <path d="M138 354 L165 354" stroke="#6f7169" marker-end="url(#arrow-gray)" class="arrow"></path>
      <path d="M295 354 L322 354" stroke="#6f7169" marker-end="url(#arrow-gray)" class="arrow"></path>
      <path d="M467 354 L494 354" stroke="#6f7169" marker-end="url(#arrow-gray)" class="arrow"></path>
      <path d="M654 354 L692 354" stroke="#6f7169" class="arrow"></path>
      <path d="M692 172 L692 568" stroke="#6f7169" class="arrow"></path>

      <rect x="710" y="78" width="360" height="170" rx="14" fill="#eaf4ff" stroke="#256fc2" class="branch"></rect>
      <text x="890" y="64" text-anchor="middle" class="label" fill="#256fc2">Temporal Texture Branch</text>

      <rect x="710" y="294" width="360" height="170" rx="14" fill="#fff6de" stroke="#b66b00" class="branch"></rect>
      <text x="890" y="490" text-anchor="middle" class="label" fill="#b66b00">Blur Physics Branch</text>

      <rect x="710" y="520" width="360" height="118" rx="14" fill="#fff0e7" stroke="#d04d2b" class="branch"></rect>
      <text x="890" y="664" text-anchor="middle" class="label" fill="#d04d2b">Context Encoder</text>

      <g text-anchor="middle" fill="#111827">
        <rect x="740" y="124" width="112" height="58" rx="7" fill="#cfe5ff" stroke="#256fc2" class="box"></rect>
        <text x="796" y="147" class="node-title">TSM head</text>
        <text x="796" y="165" class="node-text">texture cues</text>

        <rect x="882" y="124" width="118" height="58" rx="7" fill="#cfe5ff" stroke="#256fc2" class="box"></rect>
        <text x="941" y="146" class="node-title">(2+1)D conv</text>
        <text x="941" y="164" class="node-text">temporal model</text>

        <rect x="740" y="340" width="112" height="58" rx="7" fill="#ffe2a7" stroke="#b66b00" class="box"></rect>
        <text x="796" y="363" class="node-title">Blur head</text>
        <text x="796" y="381" class="node-text">physics cues</text>

        <rect x="882" y="340" width="118" height="58" rx="7" fill="#ffe2a7" stroke="#b66b00" class="box"></rect>
        <text x="941" y="362" class="node-title">Blur latent</text>
        <text x="941" y="380" class="node-text">z_blur</text>

        <rect x="918" y="548" width="122" height="58" rx="7" fill="#ffd3c2" stroke="#d04d2b" class="box"></rect>
        <text x="979" y="570" class="node-title">Quality + bias</text>
        <text x="979" y="588" class="node-text">q<tspan baseline-shift="sub">t</tspan>, b<tspan baseline-shift="sub">t</tspan></text>

        <rect x="742" y="548" width="128" height="58" rx="7" fill="#ffd3c2" stroke="#d04d2b" class="box"></rect>
        <text x="806" y="570" class="node-title">Context</text>
        <text x="806" y="588" class="node-text">observation state</text>

        <rect x="1022" y="110" width="72" height="86" rx="8" fill="#b5eee0" stroke="#007b68" class="box"></rect>
        <text x="1058" y="138" class="node-title">Speed</text>
        <text x="1058" y="156" class="node-text">+</text>
        <text x="1058" y="174" class="node-title">Conf.</text>

        <rect x="1022" y="326" width="72" height="86" rx="8" fill="#b5eee0" stroke="#007b68" class="box"></rect>
        <text x="1058" y="354" class="node-title">Speed</text>
        <text x="1058" y="372" class="node-text">+</text>
        <text x="1058" y="390" class="node-title">Conf.</text>
      </g>

      <path d="M692 172 L710 153 L740 153" stroke="#6f7169" marker-end="url(#arrow-gray)" class="arrow"></path>
      <path d="M852 153 L882 153" stroke="#256fc2" marker-end="url(#arrow-blue)" class="arrow"></path>
      <path d="M1000 153 L1022 153" stroke="#256fc2" marker-end="url(#arrow-blue)" class="arrow"></path>

      <path d="M692 369 L710 369 L740 369" stroke="#6f7169" marker-end="url(#arrow-gray)" class="arrow"></path>
      <path d="M852 369 L882 369" stroke="#b66b00" marker-end="url(#arrow-amber)" class="arrow"></path>
      <path d="M1000 369 L1022 369" stroke="#b66b00" marker-end="url(#arrow-amber)" class="arrow"></path>

      <path d="M692 568 L710 568 L742 577" stroke="#6f7169" marker-end="url(#arrow-gray)" class="arrow"></path>
      <path d="M870 577 L918 577" stroke="#d04d2b" marker-end="url(#arrow-coral)" class="arrow"></path>

      <rect x="1130" y="154" width="138" height="270" rx="14" fill="#f0eaff" stroke="#6b4bd2" class="branch"></rect>
      <text x="1199" y="138" text-anchor="middle" class="label" fill="#6b4bd2">Fusion</text>

      <g text-anchor="middle" fill="#111827">
        <rect x="1150" y="184" width="98" height="58" rx="7" fill="#d8ccff" stroke="#6b4bd2" class="box"></rect>
        <text x="1199" y="207" class="node-title">Weights</text>
        <text x="1199" y="225" class="node-text">softmax</text>

        <rect x="1150" y="284" width="98" height="58" rx="7" fill="#d8ccff" stroke="#6b4bd2" class="box"></rect>
        <text x="1199" y="307" class="node-title">Weighted</text>
        <text x="1199" y="325" class="node-text">sum</text>

        <rect x="1150" y="374" width="98" height="34" rx="7" fill="#d8ccff" stroke="#6b4bd2" class="box"></rect>
        <text x="1199" y="396" class="node-title">v_hat</text>
      </g>

      <path d="M1094 153 L1130 213 L1150 213" stroke="#6b4bd2" marker-end="url(#arrow-purple)" class="arrow"></path>
      <path d="M1094 369 L1130 313 L1150 313" stroke="#b66b00" marker-end="url(#arrow-amber)" class="arrow"></path>
      <path d="M1040 577 L1120 577 L1120 213 L1150 213" stroke="#d04d2b" marker-end="url(#arrow-coral)" class="arrow dash"></path>
      <path d="M1199 242 L1199 284" stroke="#6b4bd2" marker-end="url(#arrow-purple)" class="arrow"></path>
      <path d="M1199 342 L1199 374" stroke="#6b4bd2" marker-end="url(#arrow-purple)" class="arrow"></path>

      <rect x="1300" y="218" width="72" height="190" rx="14" fill="#e8fff8" stroke="#007b68" class="branch"></rect>
      <text x="1336" y="202" text-anchor="middle" class="label" fill="#007b68">Stabilize</text>

      <g text-anchor="middle" fill="#111827">
        <rect x="1316" y="244" width="40" height="40" rx="7" fill="#b5eee0" stroke="#007b68" class="box"></rect>
        <text x="1336" y="269" class="tiny">ROI</text>
        <rect x="1316" y="302" width="40" height="40" rx="7" fill="#b5eee0" stroke="#007b68" class="box"></rect>
        <text x="1336" y="327" class="tiny">EMA</text>
        <rect x="1316" y="360" width="40" height="40" rx="7" fill="#b5eee0" stroke="#007b68" class="box"></rect>
        <text x="1336" y="385" class="tiny">Gate</text>
      </g>

      <rect x="1294" y="444" width="92" height="64" rx="8" fill="#bbefb0" stroke="#2e9c45" class="box"></rect>
      <text x="1340" y="470" text-anchor="middle" class="node-title">Final speed</text>
      <text x="1340" y="490" text-anchor="middle" class="node-text">v_final m/s</text>

      <path d="M1248 391 L1300 391 L1316 264" stroke="#007b68" marker-end="url(#arrow-teal)" class="arrow"></path>
      <path d="M1336 284 L1336 302" stroke="#007b68" marker-end="url(#arrow-teal)" class="arrow"></path>
      <path d="M1336 342 L1336 360" stroke="#007b68" marker-end="url(#arrow-teal)" class="arrow"></path>
      <path d="M1336 400 L1336 444" stroke="#2e9c45" marker-end="url(#arrow-green)" class="arrow"></path>
    </svg>
  </main>
</body>
</html>
